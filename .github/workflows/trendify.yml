name: trendify

on:
  schedule:
    # Every 30 minutes; offset off :00/:30 because those slots are the most delayed.
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trendify

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Check trending and notify
        id: run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # always() so successful notifications are persisted even if some
      # sends failed (the script exits non-zero on partial failure).
      - name: Commit updated state
        if: always()
        env:
          NEW_COUNT: ${{ steps.run.outputs.new_count }}
        run: |
          if [ "${NEW_COUNT:-0}" -gt 0 ]; then
            git config user.name "amanverma-765"
            git config user.email "akverma4aman@gmail.com"
            if [ "$NEW_COUNT" -eq 1 ]; then
              MSG="feat: caught 1 new trending repo 🔥"
            else
              MSG="feat: caught ${NEW_COUNT} new trending repos 🔥"
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            MSG="chore: refresh trending state"
          fi
          if ! git diff --quiet -- state/seen.json || [ -n "$(git ls-files --others --exclude-standard state/seen.json)" ]; then
            git add state/seen.json
            git commit -m "$MSG"
            git pull --rebase
            git push
          else
            echo "state unchanged, nothing to commit"
          fi
